<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HayKino</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0f;
    color:white;
}

body.light{
    background:#f5f5f5;
    color:#111;
}

.header{
    text-align:center;
    padding:20px;
    background:linear-gradient(135deg,#171720,#292942);
}

body.light .header{
    background:linear-gradient(135deg,#ffffff,#dddddd);
}

.logo{
    font-size:40px;
}

.theme-btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.section{
    padding:15px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.card{
    background:#17171f;
    border-radius:15px;
    overflow:hidden;
    padding-bottom:10px;
}

body.light .card{
    background:white;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.watch{
    margin:10px;
    width:calc(100% - 20px);
    padding:10px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
}

.player{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:999;
}

.player video{
    width:100%;
    height:100%;
}

.close{
    position:absolute;
    top:15px;
    right:15px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}

</style>
</head>
<body>

<div class="header">

<div class="logo">🎬</div>

<h1>HayKino</h1>

<p>Ֆիլմեր և Սերիալներ</p>

<button class="theme-btn" onclick="toggleTheme()">
🌙 Գիշերային ռեժիմ
</button>

</div>

<div class="section">
    <h2>🎬 Ֆիլմեր</h2>
    <br>
    <div id="movies" class="cards"></div>
</div>

<div class="player" id="player">

<button class="close" onclick="closePlayer()">
✖ Փակել
</button>

<video id="video" controls></video>

</div>

<footer>
@ArmKino_bot
</footer>

<script>

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("light")
        ? "light"
        : "dark"
    );

}

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

fetch("movies.json")
.then(r=>r.json())
.then(movies=>{

    const container =
        document.getElementById("movies");

    movies.forEach(movie=>{

        container.innerHTML += `
        <div class="card">

            <img src="${movie.image}">

            <h3>${movie.title}</h3>

            <button
                class="watch"
                onclick="playMovie('${movie.video}')">
                ▶ Դիտել
            </button>

        </div>
        `;

    });

});

function playMovie(url){

    const player =
        document.getElementById("player");

    const video =
        document.getElementById("video");

    video.src = url;

    player.style.display = "block";

    video.play();

}

function closePlayer(){

    const player =
        document.getElementById("player");

    const video =
        document.getElementById("video");

    video.pause();

    player.style.display = "none";

}

</script>

</body>
</html>
