<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HayKino</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0f;
    color:white;
}

body.light{
    background:#f5f5f5;
    color:#111;
}

.header{
    text-align:center;
    padding:20px;
    background:linear-gradient(135deg,#171720,#292942);
}

body.light .header{
    background:linear-gradient(135deg,#ffffff,#dddddd);
}

.logo{
    font-size:40px;
}

.theme-btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.section{
    padding:15px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.card{
    background:#17171f;
    border-radius:15px;
    overflow:hidden;
    padding-bottom:10px;
}

body.light .card{
    background:white;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size: 16px;
}

.watch{
    margin:10px;
    width:calc(100% - 20px);
    padding:10px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
}

.player{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:999;
}

.player video{
    width:100%;
    height:100%;
}

.close{
    position:absolute;
    top:15px;
    right:15px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🎬</div>
    <h1>HayKino</h1>
    <p>Ֆիլմեր և Սերիալներ</p>
    <button class="theme-btn" onclick="toggleTheme()">
        🌙 Գիշերային ռեժիմ
    </button>
</div>

<div class="section">
    <h2>🎬 Ֆիլմեր</h2>
    <br>
    <div id="movies" class="cards"></div>
</div>

<div class="player" id="player">
    <button class="close" onclick="closePlayer()">
        ✖ Փակել
    </button>
    <video id="video" controls></video>
</div>

<footer>
    @ArmKino_bot
</footer>

<script>
// 1. Ֆիլմերի մեծ ցուցակը (Array)
const moviesList = [
    {
        "title": "Տղամարդիկ",
        "image": "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500",
        "video": "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        "title": "Կտոր մը երկինք",
        "image": "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500",
        "video": "https://img.asnap.com/sample.mp4"
    },
    {
        "title": "Մեր մանկության տանգոն",
        "image": "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=500",
        "video": "https://www.w3schools.com/html/movie.mp4"
    },
    {
        "title": "Ինտերստելար (Interstellar)",
        "image": "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500",
        "video": "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        "title": "Մատանիքների տիրակալը",
        "image": "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500",
        "video": "https://www.w3schools.com/html/movie.mp4"
    },
    {
        "title": "Հարրի Փոթեր",
        "image": "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=500",
        "video": "https://img.asnap.com/sample.mp4"
    },
    {
        "title": "Գլադիատոր (Gladiator)",
        "image": "https://images.unsplash.com/photo-1559181567-c3190ca9959b?w=500",
        "video": "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        "title": "Ալադին (Մուլտֆիլմ)",
        "image": "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500",
        "video": "https://www.w3schools.com/html/movie.mp4"
    },
    {
        "title": "Տիտանիկ (Titanic)",
        "image": "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=500",
        "video": "https://img.asnap.com/sample.mp4"
    },
    {
        "title": "Հարսնացուն հյուսիսից",
        "image": "https://images.unsplash.com/photo-1465847899084-d164df4dedc6?w=500",
        "video": "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        "title": "Շրեկ (Shrek)",
        "image": "https://images.unsplash.com/photo-1608889174637-3c44f6326f2a?w=500",
        "video": "https://www.w3schools.com/html/movie.mp4"
    },
    {
        "title": "Ավատար (Avatar)",
        "image": "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500",
        "video": "https://img.asnap.com/sample.mp4"
    }
];

// 2. Թեմայի փոփոխման ֆունկցիա
function toggleTheme(){
    document.body.classList.toggle("light");
    localStorage.setItem(
        "theme",
        document.body.classList.contains("light") ? "light" : "dark"
    );
}

if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

// 3. Ֆիլմերի ավտոմատ ցուցադրում էջում
const container = document.getElementById("movies");

moviesList.forEach(movie => {
    container.innerHTML += `
    <div class="card">
        <img src="${movie.image}">
        <h3>${movie.title}</h3>
        <button class="watch" onclick="playMovie('${movie.video}')">
            ▶ Դիտել
        </button>
    </div>
    `;
});

// 4. Նվագարկչի (Player) ֆունկցիաներ
function playMovie(url){
    const player = document.getElementById("player");
    const video = document.getElementById("video");
    video.src = url;
    player.style.display = "block";
    video.play();
}

function closePlayer(){
    const player = document.getElementById("player");
    const video = document.getElementById("video");
    video.pause();
    player.style.display = "none";
}
</script>

</body>
</html>
